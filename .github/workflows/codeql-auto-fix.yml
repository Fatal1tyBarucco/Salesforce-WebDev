name: "Auto-fix Code Scanning Alerts"

on:
  code_scanning_alert:
    types: [created]

permissions:
  contents: write
  security-events: write
  issues: write
  pull-requests: write

jobs:
  auto-fix:
    name: Auto-fix Alert
    runs-on: ubuntu-latest
    if: github.event.alert.state == 'open'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Get alert details
        id: alert
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ALERT_ID="${{ github.event.alert.number }}"
          ALERT_URL="${{ github.event.alert.html_url }}"
          RULE_ID="${{ github.event.alert.rule.id }}"
          FILE_PATH="${{ github.event.alert.most_recent_instance.location.path }}"
          FILE_LINE="${{ github.event.alert.most_recent_instance.location.start_line }}"

          echo "alert_id=$ALERT_ID" >> $GITHUB_OUTPUT
          echo "alert_url=$ALERT_URL" >> $GITHUB_OUTPUT
          echo "rule_id=$RULE_ID" >> $GITHUB_OUTPUT
          echo "file_path=$FILE_PATH" >> $GITHUB_OUTPUT
          echo "file_line=$FILE_LINE" >> $GITHUB_OUTPUT

          echo "## CodeQL Alert #$ALERT_ID" >> $GITHUB_STEP_SUMMARY
          echo "- Rule: \`$RULE_ID\`" >> $GITHUB_STEP_SUMMARY
          echo "- File: \`$FILE_PATH:$FILE_LINE\`" >> $GITHUB_STEP_SUMMARY
          echo "- URL: $ALERT_URL" >> $GITHUB_STEP_SUMMARY

      - name: Auto-dismiss test file alerts
        if: startsWith(steps.alert.outputs.file_path, 'tests/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ALERT_ID="${{ steps.alert.outputs.alert_id }}"
          gh api repos/${{ github.repository }}/code-scanning/alerts/$ALERT_ID \
            -X PATCH \
            -f state=dismissed \
            -f dismissed_reason="used in tests" \
            -f dismissed_comment="Auto-dismissed: alert in test file"
          echo "✅ Auto-dismissed alert #$ALERT_ID (test file)" >> $GITHUB_STEP_SUMMARY

      - name: Auto-fix unpinned action tags
        if: steps.alert.outputs.rule_id == 'actions/unpinned-tag'
        run: |
          FILE="${{ steps.alert.outputs.file_path }}"
          LINE="${{ steps.alert.outputs.file_line }}"

          # Read the line and extract the action reference
          ACTION_LINE=$(sed -n "${LINE}p" "$FILE")

          # Extract owner/repo from 'uses: owner/repo@ref'
          ACTION_REF=$(echo "$ACTION_LINE" | grep -oP 'uses:\s*\K[^@]+' | tr -d ' ')

          if [ -n "$ACTION_REF" ]; then
            # Get the latest commit SHA for this action
            OWNER=$(echo "$ACTION_REF" | cut -d'/' -f1)
            REPO=$(echo "$ACTION_REF" | cut -d'/' -f2)

            # Try to get the default branch's HEAD SHA
            SHA=$(gh api repos/$OWNER/$REPO/commits/main --jq '.sha' 2>/dev/null || \
                  gh api repos/$OWNER/$REPO/commits/master --jq '.sha' 2>/dev/null || \
                  echo "")

            if [ -n "$SHA" ]; then
              # Replace @latest or @v* with @SHA
              sed -i "s|uses: ${ACTION_REF}@.*|uses: ${ACTION_REF}@${SHA}|" "$FILE"
              echo "✅ Pinned $ACTION_REF to $SHA" >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Create branch and commit
        if: steps.alert.outputs.rule_id == 'actions/unpinned-tag'
        run: |
          ALERT_ID="${{ steps.alert.outputs.alert_id }}"
          FILE="${{ steps.alert.outputs.file_path }}"
          BRANCH="fix/codeql-alert-${ALERT_ID}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add "$FILE"
          git commit -m "fix(security): pin action version for CodeQL alert #${ALERT_ID}"
          git push origin "$BRANCH"

          # Create PR
          gh pr create \
            --title "fix(security): CodeQL alert #${ALERT_ID}" \
            --body "## Summary
          Auto-fix for CodeQL alert #${ALERT_ID}

          - Rule: \`${{ steps.alert.outputs.rule_id }}\`
          - File: \`${{ steps.alert.outputs.file_path }}:${{ steps.alert.outputs.file_line }}\`

          Pinned action to specific commit SHA for reproducibility and security.

          [View Alert](${{ steps.alert.outputs.alert_url }})" \
            --base main

          echo "✅ Created PR for fix" >> $GITHUB_STEP_SUMMARY

      - name: Create issue for manual review
        if: |
          steps.alert.outputs.rule_id != 'actions/unpinned-tag' &&
          !startsWith(steps.alert.outputs.file_path, 'tests/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ALERT_ID="${{ steps.alert.outputs.alert_id }}"
          RULE_ID="${{ steps.alert.outputs.rule_id }}"
          FILE="${{ steps.alert.outputs.file_path }}"
          LINE="${{ steps.alert.outputs.file_line }}"
          URL="${{ steps.alert.outputs.alert_url }}"

          gh issue create \
            --title "CodeQL: ${RULE_ID} in ${FILE}:${LINE}" \
            --label "security,auto-triaged" \
            --body "## CodeQL Alert #${ALERT_ID}

          | Field | Value |
          | --- | --- |
          | Rule | \`${RULE_ID}\` |
          | File | \`${FILE}:${LINE}\` |
          | Severity | ${{ github.event.alert.rule.severity }} |
          | Alert | [View on GitHub](${URL}) |

          ## Description
          ${{ github.event.alert.rule.description }}

          ## Recommended Fix
          ${{ github.event.alert.rule.help }}

          ---
          *Auto-created by code-scanning-alert workflow*"

          echo "✅ Created issue for manual review" >> $GITHUB_STEP_SUMMARY
