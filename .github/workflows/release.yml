name: "Release"

on:
  workflow_run:
    workflows: ["🚀 Salesforce Release Notes Pipeline"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  PYTHON_VERSION: "3.13"

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Get latest release info
        id: release_info
        run: |
          LATEST_META=$(ls -t releases/*/.meta.json 2>/dev/null | head -1)
          if [ -z "$LATEST_META" ]; then
            echo "has_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          SLUG=$(basename $(dirname $(dirname $LATEST_META)))
          NAME=$(python3 -c "import json; print(json.load(open('$LATEST_META'))['name'])")
          FEATURES=$(python3 -c "import json; d=json.load(open('$LATEST_META')); print(d.get('total_features', sum(c['count'] for c in d.get('categories', []))))")
          DATE=$(python3 -c "import json; print(json.load(open('$LATEST_META')).get('generated_at', ''))")
          CATEGORY_COUNT=$(python3 -c "import json; print(len(json.load(open('$LATEST_META')).get('categories', [])))")
          RELEASE_ID=$(python3 -c "import json; print(json.load(open('$LATEST_META')).get('release_id', 0))")

          # Build tag in vYEAR-season format (matching pipeline)
          YEAR_SHORT=$(echo "$SLUG" | grep -oP '\d+$')
          YEAR="20${YEAR_SHORT}"
          SEASON=$(echo "$SLUG" | sed 's/_[0-9]*$//')
          TAG_NAME="v${YEAR}-${SEASON}"

          echo "has_release=true" >> $GITHUB_OUTPUT
          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "features=$FEATURES" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "categories=$CATEGORY_COUNT" >> $GITHUB_OUTPUT
          echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Check for existing release
        if: steps.release_info.outputs.has_release == 'true'
        id: check_existing
        run: |
          TAG="${{ steps.release_info.outputs.tag_name }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for existing GitHub Release
        if: steps.release_info.outputs.has_release == 'true' && steps.check_existing.outputs.exists == 'false'
        id: gh_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.release_info.outputs.tag_name }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "gh_exists=true" >> $GITHUB_OUTPUT
          else
            echo "gh_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        if: |
          steps.release_info.outputs.has_release == 'true' &&
          steps.check_existing.outputs.exists == 'false' &&
          steps.gh_check.outputs.gh_exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.release_info.outputs.tag_name }}"
          NAME="${{ steps.release_info.outputs.name }}"
          FEATURES="${{ steps.release_info.outputs.features }}"
          CATEGORIES="${{ steps.release_info.outputs.categories }}"
          DATE="${{ steps.release_info.outputs.date }}"
          SLUG="${{ steps.release_info.outputs.slug }}"

          NL=$'\n'
          NOTES="## 📋 ${NAME} Release Notes${NL}${NL}"
          NOTES+="### 📊 Statistics${NL}"
          NOTES+="| Metric | Value |${NL}"
          NOTES+="| --- | --- |${NL}"
          NOTES+="| Features | ${FEATURES} |${NL}"
          NOTES+="| Categories | ${CATEGORIES} |${NL}"
          NOTES+="| Generated | ${DATE} |${NL}${NL}"
          NOTES+="### 🔗 Links${NL}"
          NOTES+="- [Full Release Notes](./releases/${SLUG}/)${NL}"
          NOTES+="- [README](./README.md)${NL}"
          NOTES+="- [Documentation](https://fatal1tybarucco.github.io/Salesforce-WebDev/)${NL}${NL}"
          NOTES+="### 🏷️ Trailhead Modules${NL}"
          NOTES+="Check individual category files for related Trailhead modules.${NL}${NL}"
          NOTES+="---${NL}"
          NOTES+="*Auto-generated by Salesforce Release Notes Pipeline*"

          # Determine --latest flag based on release_id
          RELEASE_ID=${{ steps.release_info.outputs.release_id }}
          MAX_EXISTING=$(gh release list --json body -q '.[].body' 2>/dev/null | grep -oP 'release_id.*?(\d+)' | grep -oP '\d+' | sort -n | tail -1 || echo "0")
          if [ -z "$MAX_EXISTING" ] || [ "$RELEASE_ID" -gt "$MAX_EXISTING" ]; then
            IS_LATEST="--latest"
          else
            IS_LATEST="--latest=false"
          fi

          gh release create "$TAG" \
            --title "$NAME" \
            --notes "$NOTES" \
            ${IS_LATEST}

      - name: Update release badge
        if: |
          steps.release_info.outputs.has_release == 'true' &&
          steps.check_existing.outputs.exists == 'false' &&
          steps.gh_check.outputs.gh_exists == 'false'
        run: |
          TAG="${{ steps.release_info.outputs.tag_name }}"
          echo "Release created: $TAG"
