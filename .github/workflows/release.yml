name: "Release"

on:
  workflow_run:
    workflows: ["🚀 Salesforce Release Notes Pipeline"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Get latest release info
        id: release_info
        run: |
          LATEST_META=$(ls -t releases/*/.meta.json 2>/dev/null | head -1)
          if [ -z "$LATEST_META" ]; then
            echo "has_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          SLUG=$(dirname $(dirname $LATEST_META) | xargs basename)
          NAME=$(python -c "import json; print(json.load(open('$LATEST_META'))['name'])")
          FEATURES=$(python -c "import json; print(json.load(open('$LATEST_META')).get('total_features', 0))")
          DATE=$(python -c "import json; print(json.load(open('$LATEST_META')).get('generated_at', ''))")
          CATEGORY_COUNT=$(python -c "import json; print(len(json.load(open('$LATEST_META')).get('categories', [])))")

          echo "has_release=true" >> $GITHUB_OUTPUT
          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "features=$FEATURES" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "categories=$CATEGORY_COUNT" >> $GITHUB_OUTPUT

      - name: Check for existing release
        if: steps.release_info.outputs.has_release == 'true'
        id: check_existing
        run: |
          TAG="v${{ steps.release_info.outputs.slug }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Download Release in a Box PDF
        if: steps.release_info.outputs.has_release == 'true' && steps.check_existing.outputs.exists == 'false'
        id: pdf
        run: |
          SLUG="${{ steps.release_info.outputs.slug }}"
          # Extract season/year from slug
          SEASON=$(echo "$SLUG" | sed 's/_[0-9]*//' | sed 's/\b\(.\)/\u\1/g')
          YEAR_SHORT=$(echo "$SLUG" | grep -oP '\d+$')
          YEAR="20${YEAR_SHORT}"

          PDF_URL="https://www.salesforce.com/en-us/wp-content/uploads/sites/4/documents/PDF/release-in-a-box-${SEASON,,}-${YEAR_SHORT}-v3.pdf"
          PDF_DEST="releases/${SLUG}/release-in-a-box.pdf"

          if curl -sSfL -o "$PDF_DEST" "$PDF_URL" 2>/dev/null; then
            echo "downloaded=true" >> $GITHUB_OUTPUT
            echo "pdf_path=$PDF_DEST" >> $GITHUB_OUTPUT
          else
            echo "downloaded=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        if: steps.release_info.outputs.has_release == 'true' && steps.check_existing.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.release_info.outputs.slug }}"
          NAME="${{ steps.release_info.outputs.name }}"
          FEATURES="${{ steps.release_info.outputs.features }}"
          CATEGORIES="${{ steps.release_info.outputs.categories }}"
          DATE="${{ steps.release_info.outputs.date }}"

          NOTES="## 📋 ${NAME} Release Notes

          ### 📊 Statistics
          | Metric | Value |
          | --- | --- |
          | Features | ${FEATURES} |
          | Categories | ${CATEGORIES} |
          | Generated | ${DATE} |

          ### 🔗 Links
          - [Full Release Notes](./releases/${{ steps.release_info.outputs.slug }}/)
          - [README](./README.md)
          - [Documentation](https://fatal1tybarucco.github.io/Salesforce-WebDev/)

          ### 🏷️ Trailhead Modules
          Check individual category files for related Trailhead modules.

          ---
          *Auto-generated by Salesforce Release Notes Pipeline*"

          ASSETS=""
          if [ "${{ steps.pdf.outputs.downloaded }}" == "true" ]; then
            ASSETS="${{ steps.pdf.outputs.pdf_path }}"
          fi

          gh release create "$TAG" \
            --title "$NAME" \
            --notes "$NOTES" \
            --latest \
            $ASSETS

      - name: Update release badge
        if: steps.release_info.outputs.has_release == 'true' && steps.check_existing.outputs.exists == 'false'
        run: |
          TAG="v${{ steps.release_info.outputs.slug }}"
          echo "Release created: $TAG"
