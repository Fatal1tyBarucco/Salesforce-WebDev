name: Python Quality

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.14]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff
        run: uv run ruff check .

      - name: Black
        run: uv run black --check .

      - name: Mypy
        run: uv run mypy src/

  test:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests with coverage
        run: uv run pytest tests/ --cov=src --cov-report=term-missing -q

      - name: Check coverage threshold
        run: uv run pytest tests/ --cov=src --cov-fail-under=99 -q
