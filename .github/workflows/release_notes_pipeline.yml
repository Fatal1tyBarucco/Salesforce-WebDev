# 🚀 Salesforce Release Notes Pipeline
#
# Flowchart:
#   Salesforce Help → Playwright → FeatureImpactParser → Markdown → README → GitHub Pages
#
# Jobs:
#   1. Lint & Type Check (ruff, mypy)
#   2. Extract & Generate (scrape, parse, generate, commit)
#
# Schedule: Weekly on Monday at 08:00 UTC
# Manual: workflow_dispatch with optional release_slug and dry_run

name: 🚀 Salesforce Release Notes Pipeline

permissions:
  contents: write
  issues: write

on:
  schedule:
    - cron: "0 8 * * 1"

  workflow_dispatch:
    inputs:
      release_slug:
        description: "Slug da release específica (ex: summer_26). Deixe vazio para todas."
        required: false
        default: ""
      dry_run:
        description: "Simular sem escrever arquivos?"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: pipeline-${{ github.event_name }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.14"
  WORKING_DIR: "."
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v7

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar dependências de desenvolvimento
        run: uv sync --extra dev

      - name: Ruff — Linting e formatação
        run: uv run ruff check src/ --output-format=github

      - name: Mypy — Verificação de tipos estáticos
        run: uv run mypy src/ --ignore-missing-imports --disallow-untyped-defs --disallow-incomplete-defs
      
  extract:
    name: 📥 Extração e Geração de Artefatos
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar dependências
        run: uv sync

      - name: Instalar Playwright browsers
        run: uv run playwright install chromium

      - name: Configurar identidade do bot para commits
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolver parâmetros de execução
        id: params
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "dry_run=${{ github.event.inputs.dry_run }}"           >> $GITHUB_OUTPUT
            echo "release_slug=${{ github.event.inputs.release_slug }}" >> $GITHUB_OUTPUT
          else
            echo "dry_run=false"   >> $GITHUB_OUTPUT
            echo "release_slug="   >> $GITHUB_OUTPUT
          fi

      - name: Executar pipeline de extração
        run: |
          ARGS=""
          if [ "${{ steps.params.outputs.dry_run }}" == "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ steps.params.outputs.release_slug }}" ]; then
            ARGS="$ARGS --release ${{ steps.params.outputs.release_slug }}"
          fi
          uv run python -m src.main $ARGS
        working-directory: ${{ env.WORKING_DIR }}

      - name: Verificar alterações geradas
        id: git_status
        if: steps.params.outputs.dry_run == 'false'
        run: |
          if [ -n "$(git status --porcelain releases/ README.md)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit e push dos artefatos gerados
        if: |
          steps.params.outputs.dry_run == 'false' &&
          steps.git_status.outputs.has_changes == 'true'
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          git add releases/ README.md README.en.md
          git commit -m "chore(release-notes): atualização automática — ${TIMESTAMP}"
          git push origin HEAD:${{ github.ref_name }}

      - name: Criar GitHub Release
        if: |
          steps.params.outputs.dry_run == 'false' &&
          steps.git_status.outputs.has_changes == 'true' &&
          steps.params.outputs.release_slug != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SLUG="${{ steps.params.outputs.release_slug }}"
          RELEASE_DIR="releases/${SLUG}"
          TAG_NAME="v$(echo ${SLUG} | sed 's/_/-/g')"
          
          if [ -d "$RELEASE_DIR" ] && [ -f "${RELEASE_DIR}/.meta.json" ]; then
            if gh release view "${TAG_NAME}" > /dev/null 2>&1; then
              echo "Release ${TAG_NAME} already exists, skipping"
            else
              META=$(cat "${RELEASE_DIR}/.meta.json")
              RELEASE_NAME=$(echo "$META" | python3 -c "import sys, json; print(json.load(sys.stdin)['name'])")
              TOTAL=$(echo "$META" | python3 -c "import sys, json; print(sum(c['count'] for c in json.load(sys.stdin).get('categories', [])))")
              CATEGORIES=$(echo "$META" | python3 -c "import sys, json; print(len(json.load(sys.stdin).get('categories', [])))")
              
              NOTES="## 📦 ${RELEASE_NAME}\n\n"
              NOTES+="- **${TOTAL}** recursos em **${CATEGORIES}** categorias\n"
              NOTES+="- 🇧🇷 [Documentação pt_BR](./releases/${SLUG}/pt_BR/)\n"
              NOTES+="- 🇺🇸 [Documentation en_US](./releases/${SLUG}/en_US/)\n"
              
              gh release create "${TAG_NAME}" \
                --title "${RELEASE_NAME}" \
                --notes "$(echo -e "$NOTES")" \
                --latest=false
              
              echo "GitHub Release created: ${TAG_NAME}"
            fi
          fi

      - name: Gerar sumário do pipeline
        if: always()
        run: |
          echo "## 📊 Sumário do Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "```mermaid" >> $GITHUB_STEP_SUMMARY
          echo "flowchart LR" >> $GITHUB_STEP_SUMMARY
          echo "    A[Salesforce Help] -->|Playwright| B[Parser]" >> $GITHUB_STEP_SUMMARY
          echo "    B -->|FeatureImpact| C[Markdown]" >> $GITHUB_STEP_SUMMARY
          echo "    C -->|Generator| D[Releases]" >> $GITHUB_STEP_SUMMARY
          echo "    C -->|Updater| E[README]" >> $GITHUB_STEP_SUMMARY
          echo "    D -->|Jekyll| F[GitHub Pages]" >> $GITHUB_STEP_SUMMARY
          echo "    E -->|Jekyll| F" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parâmetro | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Dry Run | \`${{ steps.params.outputs.dry_run }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Release | \`${{ steps.params.outputs.release_slug || 'todas' }}\` |" >> $GITHUB_STEP_SUMMARY