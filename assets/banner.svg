<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <!-- Main background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="40%" stop-color="#0d1b3e"/>
      <stop offset="100%" stop-color="#112240"/>
    </linearGradient>
    
    <!-- Accent gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#0099ff"/>
      <stop offset="100%" stop-color="#0066cc"/>
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Soft shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bgGrad)" rx="16"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#00d4ff" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="160" y1="0" x2="160" y2="320"/>
    <line x1="320" y1="0" x2="320" y2="320"/>
    <line x1="480" y1="0" x2="480" y2="320"/>
    <line x1="640" y1="0" x2="640" y2="320"/>
    <line x1="800" y1="0" x2="800" y2="320"/>
    <line x1="960" y1="0" x2="960" y2="320"/>
    <line x1="1120" y1="0" x2="1120" y2="320"/>
  </g>
  
  <!-- Decorative circles (abstract data nodes) -->
  <circle cx="120" cy="80" r="60" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.1"/>
  <circle cx="120" cy="80" r="40" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.15"/>
  <circle cx="120" cy="80" r="20" fill="#00d4ff" opacity="0.08"/>
  
  <!-- Cloud icon (modern Salesforce style) -->
  <g transform="translate(80, 50)" filter="url(#glow)">
    <path d="M40 90 C15 90 5 70 15 50 C5 30 25 15 50 15 C65 15 78 25 85 40 C90 25 105 20 120 30 C145 30 155 50 145 70 C160 75 160 95 140 95 Z" 
          fill="none" stroke="url(#accentGrad)" stroke-width="2.5" opacity="0.9"/>
    <path d="M45 85 C22 85 14 68 22 52 C14 35 30 22 52 22 C65 22 76 30 82 42 C87 30 100 26 112 34 C132 34 140 48 132 65 C145 68 145 85 128 85 Z" 
          fill="#00d4ff" opacity="0.12"/>
  </g>
  
  <!-- Data visualization elements (left side) -->
  <g transform="translate(60, 160)" opacity="0.6">
    <!-- Bar chart representation -->
    <rect x="0" y="40" width="8" height="30" rx="2" fill="#00d4ff" opacity="0.7"/>
    <rect x="14" y="25" width="8" height="45" rx="2" fill="#00d4ff" opacity="0.8"/>
    <rect x="28" y="10" width="8" height="60" rx="2" fill="#00d4ff" opacity="0.9"/>
    <rect x="42" y="35" width="8" height="35" rx="2" fill="#00d4ff" opacity="0.7"/>
    <rect x="56" y="20" width="8" height="50" rx="2" fill="#00d4ff" opacity="0.85"/>
    
    <!-- Connection dots -->
    <circle cx="80" cy="40" r="3" fill="#00d4ff"/>
    <circle cx="95" cy="30" r="2.5" fill="#00d4ff" opacity="0.7"/>
    <circle cx="110" cy="45" r="3" fill="#00d4ff" opacity="0.8"/>
    <circle cx="125" cy="25" r="2" fill="#00d4ff" opacity="0.6"/>
    
    <!-- Connecting line -->
    <path d="M80 40 Q90 35 95 30 Q105 38 110 45 Q118 35 125 25" 
          fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
  </g>
  
  <!-- Main title -->
  <text x="420" y="110" font-family="'Inter', 'Segoe UI', -apple-system, sans-serif" 
        font-size="48" font-weight="800" fill="#FFFFFF" letter-spacing="-1">
    Salesforce Release
  </text>
  <text x="420" y="165" font-family="'Inter', 'Segoe UI', -apple-system, sans-serif" 
        font-size="48" font-weight="800" fill="url(#accentGrad)" letter-spacing="-1">
    Notes Intelligence
  </text>
  
  <!-- Subtitle with accent line -->
  <line x1="420" y1="185" x2="580" y2="185" stroke="url(#accentGrad)" stroke-width="2" opacity="0.6"/>
  <text x="420" y="210" font-family="'Inter', 'Segoe UI', -apple-system, sans-serif" 
        font-size="14" fill="#7b8ba3" letter-spacing="3" font-weight="500">
    AUTOMATED EXTRACTION · CLASSIFICATION · VERSIONING
  </text>
  
  <!-- Feature tags -->
  <g transform="translate(420, 235)">
    <g>
      <rect x="0" y="0" width="92" height="30" rx="6" fill="#00d4ff" fill-opacity="0.08" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="46" y="19" font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#00d4ff" text-anchor="middle" font-weight="600">Python 3.14</text>
    </g>
    <g transform="translate(102, 0)">
      <rect x="0" y="0" width="100" height="30" rx="6" fill="#00d4ff" fill-opacity="0.08" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="50" y="19" font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#00d4ff" text-anchor="middle" font-weight="600">Playwright</text>
    </g>
    <g transform="translate(212, 0)">
      <rect x="0" y="0" width="78" height="30" rx="6" fill="#00d4ff" fill-opacity="0.08" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="39" y="19" font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#00d4ff" text-anchor="middle" font-weight="600">CI/CD</text>
    </g>
    <g transform="translate(300, 0)">
      <rect x="0" y="0" width="92" height="30" rx="6" fill="#00d4ff" fill-opacity="0.08" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.3"/>
      <text x="46" y="19" font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#00d4ff" text-anchor="middle" font-weight="600">Markdown</text>
    </g>
  </g>
  
  <!-- Right side decorative element (code bracket) -->
  <g transform="translate(1080, 60)" opacity="0.15">
    <text x="0" y="0" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="72" fill="#00d4ff" font-weight="300">{</text>
    <text x="50" y="70" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="72" fill="#00d4ff" font-weight="300">}</text>
  </g>
  
  <!-- Version badge -->
  <g transform="translate(1100, 260)">
    <rect x="0" y="0" width="140" height="36" rx="18" fill="url(#accentGrad)" filter="url(#shadow)"/>
    <text x="70" y="23" font-family="'Inter', 'Segoe UI', sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle" font-weight="700" letter-spacing="1">
      Knowledge-as-Code
    </text>
  </g>
  
  <!-- Bottom accent line -->
  <rect x="0" y="316" width="1280" height="4" fill="url(#accentGrad)" rx="2"/>
  
  <!-- Top accent dots -->
  <circle cx="40" cy="20" r="3" fill="#00d4ff" opacity="0.4"/>
  <circle cx="60" cy="20" r="2" fill="#00d4ff" opacity="0.3"/>
  <circle cx="76" cy="20" r="2.5" fill="#00d4ff" opacity="0.35"/>
</svg>
