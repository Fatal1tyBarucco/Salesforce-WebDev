<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 200" width="1000" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#112240"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0099ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="1000" height="200" fill="url(#bg)" rx="8"/>
  
  <!-- Flow boxes -->
  <g font-family="'Inter', sans-serif" font-size="12" fill="#fff" text-anchor="middle">
    <!-- Box 1: Source -->
    <rect x="20" y="60" width="120" height="80" rx="8" fill="#1a3a6e" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="80" y="90" font-weight="600" fill="#00d4ff">Fonte</text>
    <text x="80" y="110" font-size="10" fill="#8899aa">Salesforce Help</text>
    
    <!-- Arrow 1 -->
    <line x1="140" y1="100" x2="180" y2="100" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="160" y="90" font-size="9" fill="#00d4ff">Extracao</text>
    
    <!-- Box 2: Scraper -->
    <rect x="180" y="60" width="120" height="80" rx="8" fill="#1a3a6e" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="240" y="90" font-weight="600" fill="#00d4ff">Playwright</text>
    <text x="240" y="110" font-size="10" fill="#8899aa">Scraper</text>
    
    <!-- Arrow 2 -->
    <line x1="300" y1="100" x2="340" y2="100" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="320" y="90" font-size="9" fill="#00d4ff">Parse</text>
    
    <!-- Box 3: Parser -->
    <rect x="340" y="60" width="120" height="80" rx="8" fill="#1a3a6e" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="400" y="90" font-weight="600" fill="#00d4ff">Parser</text>
    <text x="400" y="110" font-size="10" fill="#8899aa">FeatureImpact</text>
    
    <!-- Arrow 3 -->
    <line x1="460" y1="100" x2="500" y2="100" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="480" y="90" font-size="9" fill="#00d4ff">Gera</text>
    
    <!-- Box 4: Generator -->
    <rect x="500" y="60" width="120" height="80" rx="8" fill="#1a3a6e" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="560" y="90" font-weight="600" fill="#00d4ff">Markdown</text>
    <text x="560" y="110" font-size="10" fill="#8899aa">Generator</text>
    
    <!-- Arrow 4 -->
    <line x1="620" y1="100" x2="660" y2="100" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="640" y="90" font-size="9" fill="#00d4ff">Commit</text>
    
    <!-- Box 5: Releases -->
    <rect x="660" y="60" width="120" height="80" rx="8" fill="#1a3a6e" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="720" y="90" font-weight="600" fill="#00d4ff">Releases</text>
    <text x="720" y="110" font-size="10" fill="#8899aa">/releases/</text>
    
    <!-- Arrow 5 -->
    <line x1="780" y1="100" x2="820" y2="100" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="800" y="90" font-size="9" fill="#00d4ff">Deploy</text>
    
    <!-- Box 6: GitHub Pages -->
    <rect x="820" y="60" width="120" height="80" rx="8" fill="#00d4ff" fill-opacity="0.2" stroke="#00d4ff" stroke-width="2"/>
    <text x="880" y="90" font-weight="600" fill="#00d4ff">GitHub Pages</text>
    <text x="880" y="110" font-size="10" fill="#8899aa">Jekyll Deploy</text>
  </g>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00d4ff"/>
    </marker>
  </defs>
  
  <!-- Bottom label -->
  <text x="500" y="170" font-family="'Inter', sans-serif" font-size="11" fill="#556677" text-anchor="middle">
    Pipeline 100% autonomo: extracao, parse, geracao, deploy
  </text>
</svg>
