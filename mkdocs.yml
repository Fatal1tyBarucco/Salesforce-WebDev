site_name: Salesforce Release Intelligence
site_description: Automated pipeline for extracting and classifying Salesforce Release Notes
site_url: https://fatal1tybarucco.github.io/Salesforce-WebDev/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Fatal1tyBarucco/Salesforce-WebDev

nav:
  - Home: index.md
  - Architecture:
    - Overview: architecture/overview.md
    - C4 Container: architecture/c4_container.md
    - Decisions:
      - ADR-001 Parser Strategy: architecture/decisions/adr-001-parser-strategy.md
      - ADR-002 GitHub Actions: architecture/decisions/adr-002-github-actions.md
      - ADR-003 Topic Classification: architecture/decisions/adr-003-topic-classification.md
  - Contribution:
    - Testing Strategy: contribution/testing-strategy.md
  - Maintenance:
    - Local Development: maintenance/local-development.md
    - Workflow Operations: maintenance/workflow-operations.md
    - Cache Management: maintenance/cache-management.md
    - Troubleshooting: maintenance/troubleshooting.md
  - Observability:
    - Logging: observability/logging.md
    - Pipeline Health: observability/pipeline-health.md
  - Runbooks:
    - Scraper Failure: runbooks/scraper-failure.md
    - GitHub Actions Failure: runbooks/github-actions-failure.md
  - Roadmap:
    - V1: roadmap/v1.md
    - V2: roadmap/v2.md
    - V3: roadmap/v3.md
