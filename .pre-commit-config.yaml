repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=2000"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        files: ^src/
        args:
          - --ignore-missing-imports
          - --disallow-untyped-defs
          - --disallow-incomplete-defs
        additional_dependencies:
          - types-requests
          - types-beautifulsoup4
          - types-html5lib
          - types-webencodings

  # Local hooks — run in the project's own venv (uv)
  - repo: local
    hooks:
      - id: pytest-fast
        name: 🧪 Pytest (fast, no coverage)
        entry: uv run pytest tests/ -x -q --tb=short --no-header
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: pytest-coverage
        name: 🧪 Pytest (coverage ≥95%)
        entry: uv run pytest tests/ --cov=src --cov-fail-under=95 -q --tb=short --no-header
        language: system
        pass_filenames: false
        always_run: true
        stages: [manual]
